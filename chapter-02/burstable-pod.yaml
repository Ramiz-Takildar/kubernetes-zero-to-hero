# Lab 2.4 Part B: Burstable QoS Pod
# Request less than Limit = Burstable

apiVersion: v1
kind: Pod
metadata:
  name: burstable-qos
  labels:
    qos: burstable
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"  # Higher than request
        cpu: "100m"
